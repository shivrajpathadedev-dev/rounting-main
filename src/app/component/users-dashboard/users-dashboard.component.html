<div class="row">
    <div class="col-md-12 text-right">
        <button routerLink="addusers" mat-raised-button color="primary" class="mb-2">Add Users</button>
    </div>

    <div class="col-md-4">
        <ul class="list-group">
            <li *ngFor="let user of usersArr" class="list-group-item d-flex justify-content-between align-items-center"
                [routerLink]="[user.userId]" routerLinkActive="active">
                <span>{{ user.userName }} ({{ user.userId }})</span>
                <small class="badge" [ngClass]="user.isActive ? 'badge-primary' : 'badge-danger'">
                     {{ user.isActive ? 'Active' : 'Inactive' }}
                </small>
            </li>
        </ul>
    </div>
    <div class="col-md-8">
        <router-outlet></router-outlet>
    </div>
</div>
